<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Restaurant Menu</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#ff4ecd,#4cc9f0,#ffd60a);
    min-height:100vh;
}

h1{
    text-align:center;
    color:white;
    font-size:34px;
    padding:20px;
    text-shadow:2px 2px 10px black;
}

.filters{
    text-align:center;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#ff006e;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
    background:#ffbe0b;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    width:210px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.card h3{
    margin:10px;
    color:#ff006e;
}

.card p{
    margin:10px;
    font-weight:bold;
    color:#3a86ff;
}
</style>
</head>

<body>

<h1>🍭🍔 Bright Kids Restaurant Menu</h1>

<div class="filters">
<button onclick="filter('all')">All 🌈</button>
<button onclick="filter('fastfood')">Fastfood 🍔</button>
<button onclick="filter('dessert')">Dessert 🍰</button>
<button onclick="filter('drink')">Drinks 🥤</button>

function show(data){
    const box = document.getElementById("menu");
    box.innerHTML = "";
    data.forEach(i=>{
        box.innerHTML += `
        <div class="card">
            <img src="${i.img}">
            <h3>${i.n}</h3>
            <p>$ ${(5 + Math.floor(Math.random()*20))}</p>
        </div>
        `;
    });
}

function filter(cat){
    if(cat === "all") show(items);
    else show(items.filter(i=>i.c === cat));
}

show(items);

</script>
